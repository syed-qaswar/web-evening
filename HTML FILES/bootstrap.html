<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BootStrap- CSS Library</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />

  </head>
  <body>
    <h1 class="text-primary bg-dark px-2">We are working on Bootstrap</h1>

    <h1 class="text-info bg-warning">another heading</h1>

    <a href="#" class=" d-block btn-danger btn-lg">Click here</a>

    <button type="button" class="btn btn-primary">Primary</button>

    <!-- tables -->

    <table class="table table-dark table-striped-columns table-bordered table-hover">
      <thead>
        <tr class="">
          <th scope="col">#</th>
          <th scope="col">First</th>
          <th scope="col">Last</th>
          <th scope="col">Handle</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">1</th>
          <td>Mark</td>
          <td>Otto</td>
          <td>@mdo</td>
        </tr>
        <tr>
          <th scope="row">2</th>
          <td>Jacob</td>
          <td>Thornton</td>
          <td>@fat</td>
        </tr>
        <tr>
          <th scope="row">3</th>
          <td class="">John</td>
          <td>Doe</td>
          <td>@social</td>
        </tr>
      </tbody>
    </table>

    <!-- bootstrap grid -->
    <div class="container bg-dark p-4">
        <div class="row row-cols-2 justify-content-center flex-column">
            <div class="col-sm-6 col-md-4 bg-primary">Col 1</div>
            <div class="col-sm-6 col-md-4 bg-warning">Col 2</div>
            <div class="col-sm-6 col-md-4 bg-success">Col 3</div>
        </div>

        <!-- <div class="row justify-content-between">
            <div class="col-3 bg-danger">Col 3</div>
            <div class="col-3 bg-info">Col 4</div>
        </div> -->
    </div>
  </body>
</html>
