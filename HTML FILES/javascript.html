    <!-- calculator with tailwind and JS -->
     <!-- container -->
    <div class="flex justify-center items-center h-screen">
        <!-- card -->
      <div class="bg-amber-200 w-[450px] p-3 rounded-md">
        <h1 class="text-2xl font-bold my-1">Calculator</h1>

        <input type="number" id="num1" placeholder="Enter a number.." class="border-2 border-gray-900 rounded-sm p-1" />

        <input type="number" id="num2" placeholder="Enter another number.." class="border-2 border-gray-900 rounded-sm p-1" />

        <!-- a div for the buttons -->
        <div class="grid grid-cols-4 py-2">
            <button onclick="calculator('+')" class="bg-blue-200 p-1 mx-0.5 rounded-md hover:font-bold">+</button>

            <button onclick="calculator('-')" class="bg-blue-200 p-1 mx-0.5 rounded-md hover:font-bold">-</button>

            <button onclick="calculator('x')" class="bg-blue-200 p-1 mx-0.5 rounded-md hover:font-bold">x</button>

            <button onclick="calculator('/')" class="bg-blue-200 p-1 mx-0.5 rounded-md hover:font-bold">/</button>
        </div>

        <!-- result -->
        <p class="bg-blue-200 py-2 px-1 rounded-md">Result: <span id="result"></span></p>
      </div>
    </div>

    <script src="../script/index.js"></script>
  </body>
